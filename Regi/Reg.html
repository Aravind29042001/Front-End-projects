<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="Reg.css">
</head>

<body>
    <div class="main">
        <form action="">
            <h3>Registeration</h3>
            <h5>Personal Details</h5>
            <div class="pd">
                <div class="box">
                    <label for="">Full name</label>
                    <input placeholder="Enter the name">
                </div>
                <div class="box">
                    <label for="">Date of Birth</label>
                    <input placeholder="Enter the name" type="date">
                </div>

                <div class="box">
                    <label for="">Email</label>
                    <input placeholder="Enter the name" type="email">
                </div>


            </div>
            <div class="pd">
                <div class="box">
                    <label for="">Mobile</label>
                    <input placeholder="Enter the name" type="number">
                </div>
                <div class="box">
                    <label for="">Gender</label>
                    <select class="sel" name="" id="">
                        <option value="">male</option>
                        <option value="">female</option>
                        <option value="">others</option>
                    </select>
                    <!-- <input placeholder="Enter the name" > -->
                </div>

                <div class="box">
                    <label for="">Occupation</label>
                    <input placeholder="Enter the name">
                </div>


            </div>
            <h5>Identity Details</h5>
            <div class="pd">
                <div class="box">
                    <label for="">ID type</label>
                    <input placeholder="Enter the name">
                </div>
                <div class="box">
                    <label for="">ID number</label>
                    <input placeholder="Enter the name" type="tel">
                </div>

                <div class="box">
                    <label for="">Issued Authority</label>
                    <input placeholder="Enter the name">
                </div>


            </div>
            <div class="pd">
                <div class="box">
                    <label for="">Issued State</label>
                    <input placeholder="Enter the name">
                </div>
                <div class="box">
                    <label for="">Issued Date</label>
                    <input placeholder="Enter the name" type="date">
                </div>

                <div class="box">
                    <label for="">Expiry Date</label>
                    <input placeholder="Enter the name" type="date">
                    
                </div>




            </div>
            <button>Next</button>


        </form>

    </div>

</body>

</html>
